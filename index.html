<!DOCTYPE html>
<html>
<head>
<title>Sajid Ansari</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
    font-family:Arial,sans-serif;
}

.card{
    text-align:center;
    color:white;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px cyan;
    animation:float 3s ease-in-out infinite;
    width:500px;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}

h1{
    font-size:50px;
    text-shadow:0 0 15px cyan;
}

p{
    font-size:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:cyan;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    transform:scale(1.1);
}

img{
    display:none;
    width:250px;
    margin-top:20px;
    border-radius:15px;
    border:4px solid white;
}
</style>
</head>

<body>

<div class="card">

<h1>👑 Sajid Ansari</h1>

<p>Welcome To My Website</p>

<p>Future Web Developer 🚀</p>

<button onclick="showPhoto()">
Show My Photo
</button>

<br>

<img id="mypic" src="mypic.jpg">

</div>

<script>
function showPhoto(){
    document.getElementById("mypic").style.display="block";
}
</script>

</body>
</html>
